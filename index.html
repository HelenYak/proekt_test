<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-1: #0f0f12;
      --bg-2: #1a1528;
      --bg-3: #0d1820;
      --surface: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f4f2f8;
      --muted: rgba(244, 242, 248, 0.65);
      --accent: #e8a87c;
      --accent-soft: rgba(232, 168, 124, 0.35);
      --glow: rgba(232, 168, 124, 0.15);
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: clamp(1.5rem, 5vw, 3rem);
      font-family: "Outfit", system-ui, sans-serif;
      color: var(--text);
      line-height: 1.55;
      background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      background-size: 200% 200%;
      animation: bgShift 18s ease-in-out infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes bgShift {
      0% { background-position: 0% 40%; }
      100% { background-position: 100% 60%; }
    }

    .wrap {
      position: relative;
      width: 100%;
      max-width: 28rem;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: -40% -30% auto;
      height: 70%;
      background: radial-gradient(ellipse at 50% 0%, var(--glow), transparent 65%);
      pointer-events: none;
      animation: glowPulse 6s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 0.85; transform: scale(1.05); }
    }

    .card {
      position: relative;
      padding: clamp(1.75rem, 4vw, 2.25rem);
      border-radius: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.65rem;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
    }

    h1 {
      font-size: clamp(1.65rem, 4.5vw, 2rem);
      font-weight: 700;
      margin: 0 0 1.5rem;
      letter-spacing: -0.02em;
      line-height: 1.15;
      opacity: 0;
      animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    li {
      position: relative;
      margin: 0;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      font-size: 0.98rem;
      font-weight: 500;
      color: var(--muted);
      background: rgba(0, 0, 0, 0.2);
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      opacity: 0;
      transform: translateY(12px);
      transition:
        color 0.35s ease,
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        border-color 0.35s ease,
        box-shadow 0.35s ease,
        background 0.35s ease;
      cursor: default;
    }

    li:nth-child(1) { animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards; }
    li:nth-child(2) { animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards; }
    li:nth-child(3) { animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.65s forwards; }

    li::before {
      content: "";
      position: absolute;
      left: 1rem;
      top: 50%;
      width: 0.45rem;
      height: 0.45rem;
      margin-top: -0.225rem;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-soft);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
    }

    li:hover {
      color: var(--text);
      transform: translateX(4px);
      border-color: rgba(232, 168, 124, 0.25);
      background: rgba(232, 168, 124, 0.06);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
    }

    li:hover::before {
      transform: scale(1.25);
      box-shadow: 0 0 16px var(--accent);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; background-size: 100% 100%; }
      .wrap::before { animation: none; }
      .eyebrow, h1, li { animation: none; opacity: 1; transform: none; }
      li { transition: none; }
      li:hover { transform: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <span class="eyebrow">Контент</span>
      <h1>Генератор идей</h1>
      <ul>
        <li>5 идей постов для экспертов</li>
        <li>3 идеи сторис для сегодня</li>
        <li>Контент план на неделю</li>
      </ul>
    </div>
  </div>
</body>
</html>
