<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Генератор идей</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root,
    [data-theme="dark"] {
      --bg-1: #0f0f12;
      --bg-2: #1a1528;
      --bg-3: #0d1820;
      --surface: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f4f2f8;
      --muted: rgba(244, 242, 248, 0.65);
      --accent: #e8a87c;
      --accent-soft: rgba(232, 168, 124, 0.35);
      --glow: rgba(232, 168, 124, 0.15);
      --li-row-bg: rgba(0, 0, 0, 0.22);
      --li-row-border: rgba(255, 255, 255, 0.07);
      --li-hover-border: rgba(232, 168, 124, 0.28);
      --li-hover-bg: rgba(232, 168, 124, 0.08);
      --li-hover-shadow: rgba(0, 0, 0, 0.28);
      --btn-text: #1c1410;
      --top-bar-fg: rgba(244, 242, 248, 0.55);
      --card-inset: rgba(255, 255, 255, 0.06);
    }

    [data-theme="light"] {
      --bg-1: #f7f4f0;
      --bg-2: #ebe4ff;
      --bg-3: #e3f2fa;
      --surface: rgba(255, 255, 255, 0.72);
      --border: rgba(20, 15, 40, 0.09);
      --text: #17131f;
      --muted: rgba(23, 19, 31, 0.58);
      --accent: #c76d3c;
      --accent-soft: rgba(199, 109, 60, 0.35);
      --glow: rgba(199, 109, 60, 0.12);
      --li-row-bg: rgba(255, 255, 255, 0.88);
      --li-row-border: rgba(20, 15, 40, 0.07);
      --li-hover-border: rgba(199, 109, 60, 0.35);
      --li-hover-bg: rgba(199, 109, 60, 0.1);
      --li-hover-shadow: rgba(23, 19, 31, 0.08);
      --btn-text: #fffaf6;
      --top-bar-fg: rgba(23, 19, 31, 0.45);
      --card-inset: rgba(255, 255, 255, 0.5);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      font-family: "Outfit", system-ui, sans-serif;
      color: var(--text);
      line-height: 1.55;
      background: linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      background-size: 200% 200%;
      animation: bgShift 20s ease-in-out infinite alternate;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes bgShift {
      0% { background-position: 0% 38%; }
      100% { background-position: 100% 62%; }
    }

    .app {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding:
        max(0.65rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(0.85rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
      max-width: 30rem;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding-bottom: 0.35rem;
    }

    .app-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--top-bar-fg);
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      min-width: 44px;
      min-height: 44px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), background 0.25s ease, border-color 0.25s ease;
      backdrop-filter: blur(10px);
    }

    .theme-toggle:hover {
      border-color: var(--li-hover-border);
    }

    .theme-toggle:active {
      transform: scale(0.92);
    }

    .theme-toggle svg {
      width: 1.2rem;
      height: 1.2rem;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
    }

    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon {
      position: absolute;
    }

    [data-theme="dark"] .theme-toggle .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }
    [data-theme="dark"] .theme-toggle .icon-moon { opacity: 0; transform: rotate(-90deg) scale(0.5); }
    [data-theme="light"] .theme-toggle .icon-sun { opacity: 0; transform: rotate(90deg) scale(0.5); }
    [data-theme="light"] .theme-toggle .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }

    .theme-toggle {
      position: relative;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0.5rem 0 0.25rem;
    }

    @media (max-width: 480px) {
      .main {
        justify-content: flex-start;
        padding-top: 0.75rem;
      }
    }

    .wrap {
      position: relative;
      width: 100%;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: -35% -25% auto;
      height: 65%;
      background: radial-gradient(ellipse at 50% 0%, var(--glow), transparent 68%);
      pointer-events: none;
      animation: glowPulse 7s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      0% { opacity: 0.45; transform: scale(1); }
      100% { opacity: 0.88; transform: scale(1.06); }
    }

    .card {
      position: relative;
      padding: clamp(1.35rem, 4.2vw, 2rem);
      border-radius: clamp(1.15rem, 4vw, 1.45rem);
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 var(--card-inset);
    }

    @media (max-width: 480px) {
      .card {
        border-radius: 1.35rem;
        box-shadow:
          0 4px 0 rgba(0, 0, 0, 0.04),
          0 12px 40px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 var(--card-inset);
      }
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.55rem;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
    }

    h1 {
      font-size: clamp(1.55rem, 5vw, 1.95rem);
      font-weight: 700;
      margin: 0 0 1.35rem;
      letter-spacing: -0.025em;
      line-height: 1.12;
      opacity: 0;
      animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    li {
      position: relative;
      margin: 0;
      padding: 0.88rem 1rem 0.88rem 2.7rem;
      font-size: 0.97rem;
      font-weight: 500;
      color: var(--muted);
      background: var(--li-row-bg);
      border-radius: 0.85rem;
      border: 1px solid var(--li-row-border);
      opacity: 0;
      transform: translateY(12px);
      transition:
        color 0.35s ease,
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        border-color 0.35s ease,
        box-shadow 0.35s ease,
        background 0.35s ease;
      cursor: default;
    }

    li:nth-child(1) { animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.32s forwards; }
    li:nth-child(2) { animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.46s forwards; }
    li:nth-child(3) { animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards; }

    .ideas-list.intro-done li {
      animation: none;
      opacity: 1;
      transform: none;
    }

    li.is-refresh {
      animation: ideaPop 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    li:nth-child(1).is-refresh { animation-delay: 0s; }
    li:nth-child(2).is-refresh { animation-delay: 0.07s; }
    li:nth-child(3).is-refresh { animation-delay: 0.14s; }

    @keyframes ideaPop {
      0% {
        opacity: 0.35;
        transform: translateY(10px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    li::before {
      content: "";
      position: absolute;
      left: 0.95rem;
      top: 50%;
      width: 0.45rem;
      height: 0.45rem;
      margin-top: -0.225rem;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-soft);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
    }

    @media (hover: hover) {
      li:hover {
        color: var(--text);
        transform: translateX(4px);
        border-color: var(--li-hover-border);
        background: var(--li-hover-bg);
        box-shadow: 0 8px 28px var(--li-hover-shadow);
      }

      li:hover::before {
        transform: scale(1.25);
        box-shadow: 0 0 16px var(--accent);
      }
    }

    .btn-generate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      margin-top: 1.15rem;
      min-height: 3rem;
      padding: 0.85rem 1.2rem;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--btn-text);
      background: linear-gradient(135deg, var(--accent) 0%, #f0b090 100%);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px var(--accent-soft);
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s ease, opacity 0.2s ease;
    }

    [data-theme="light"] .btn-generate {
      background: linear-gradient(135deg, #b85a2a 0%, var(--accent) 55%, #e8a878 100%);
    }

    .btn-generate::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255, 255, 255, 0.35) 50%, transparent 70%);
      background-size: 200% 100%;
      animation: btnSheen 4.5s ease-in-out infinite;
      pointer-events: none;
      opacity: 0.65;
    }

    @keyframes btnSheen {
      0%, 100% { background-position: 130% 0; }
      50% { background-position: -30% 0; }
    }

    .btn-generate:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px var(--accent-soft);
    }

    .btn-generate:active:not(:disabled) {
      transform: translateY(0) scale(0.98);
    }

    .btn-generate:disabled {
      cursor: wait;
      opacity: 0.88;
    }

    .btn-generate.is-loading::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 0%,
        rgba(255, 255, 255, 0.45) 45%,
        rgba(255, 255, 255, 0.55) 50%,
        rgba(255, 255, 255, 0.45) 55%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmerLoad 0.9s linear infinite;
    }

    @keyframes shimmerLoad {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .btn-generate .btn-icon {
      display: flex;
      width: 1.15rem;
      height: 1.15rem;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .btn-generate.is-spin .btn-icon {
      animation: spinSpark 0.75s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes spinSpark {
      0% { transform: rotate(0deg) scale(1); }
      40% { transform: rotate(180deg) scale(1.15); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .btn-label {
      position: relative;
      z-index: 1;
    }

    .btn-generate .btn-icon {
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; background-size: 100% 100%; }
      .wrap::before { animation: none; }
      .eyebrow, h1, li { animation: none; opacity: 1; transform: none; }
      li { transition: none; }
      li.is-refresh { animation: none; }
      @media (hover: hover) {
        li:hover { transform: none; }
      }
      .btn-generate::before { animation: none; opacity: 0; }
      .btn-generate.is-loading::after { animation: none; }
      .theme-toggle svg { transition: none; }
      .btn-generate.is-spin .btn-icon { animation: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <span class="app-title">Генератор</span>
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <main class="main">
      <div class="wrap">
        <div class="card">
          <span class="eyebrow">Контент</span>
          <h1>Генератор идей</h1>
          <ul id="ideasList" class="ideas-list">
            <li>5 идей постов для экспертов</li>
            <li>3 идеи сторис для сегодня</li>
            <li>Контент план на неделю</li>
          </ul>
          <button type="button" class="btn-generate" id="btnGenerate">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                <path d="M19 3v4M21 5h-4"/>
              </svg>
            </span>
            <span class="btn-label">Сгенерировать идеи</span>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var root = document.documentElement;
      var storageKey = "idea-gen-theme";

      function getPreferredTheme() {
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
          return "light";
        }
        return "dark";
      }

      function applyTheme(theme) {
        root.setAttribute("data-theme", theme);
        try {
          localStorage.setItem(storageKey, theme);
        } catch (e) {}
      }

      try {
        var saved = localStorage.getItem(storageKey);
        if (saved === "light" || saved === "dark") {
          applyTheme(saved);
        } else {
          applyTheme(getPreferredTheme());
        }
      } catch (e) {
        applyTheme("dark");
      }

      document.getElementById("themeToggle").addEventListener("click", function () {
        var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
        applyTheme(next);
      });

      var btn = document.getElementById("btnGenerate");
      var list = document.getElementById("ideasList");
      var items = list.querySelectorAll("li");
      var loading = false;

      function prefersReducedMotion() {
        return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      }

      window.setTimeout(function () {
        list.classList.add("intro-done");
      }, prefersReducedMotion() ? 0 : 1000);

      btn.addEventListener("click", function () {
        if (loading) return;
        loading = true;
        btn.disabled = true;
        btn.classList.add("is-loading");
        btn.classList.add("is-spin");

        var loadMs = prefersReducedMotion() ? 200 : 720;

        window.setTimeout(function () {
          btn.classList.remove("is-loading");
          btn.disabled = false;
          loading = false;

          items.forEach(function (li) {
            li.classList.remove("is-refresh");
          });
          void list.offsetWidth;
          items.forEach(function (li) {
            li.classList.add("is-refresh");
          });

          window.setTimeout(function () {
            btn.classList.remove("is-spin");
            items.forEach(function (li) {
              li.classList.remove("is-refresh");
            });
          }, prefersReducedMotion() ? 50 : 650);
        }, loadMs);
      });
    })();
  </script>
</body>
</html>
